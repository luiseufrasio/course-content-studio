# LLM backend selection for the Payara Jakarta Agentic AI runtime.
#
# Default: a local Ollama model (no API key, no cost). Quiz generation returns
# JSON, so a capable model helps — gemma3:12b is recommended over 4b for clean,
# parseable quizzes.
payara.agentic.llm.provider=ollama
payara.agentic.llm.model=gemma3:12b
payara.agentic.llm.ollama.base-url=http://localhost:11434
payara.agentic.llm.system=You are an experienced curriculum designer who writes clear, accurate teaching material.

# --- Alternative: Anthropic / Claude (best quality) -------------------------
# payara.agentic.llm.provider=anthropic
# payara.agentic.llm.model=claude-opus-4-8
# payara.agentic.llm.max-tokens=8192
# Set the key in the SERVER environment before restart-domain:
#   export ANTHROPIC_API_KEY=sk-ant-...
# or:  payara.agentic.llm.anthropic.api-key=sk-ant-...