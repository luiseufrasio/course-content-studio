# LLM backend selection for the Payara Jakarta Agentic AI runtime.
# "vertex" uses Claude on Google Cloud Vertex AI authenticated via ADC (gcloud).
# Project ID and region fall back to the ANTHROPIC_VERTEX_PROJECT_ID and
# CLOUD_ML_REGION environment variables when the properties below are absent.
payara.agentic.llm.provider=vertex
payara.agentic.llm.model=claude-sonnet-4-6
payara.agentic.llm.max-tokens=8192
payara.agentic.llm.system=You are an expert curriculum designer and teacher creating study material for students. You write clear, accurate and engaging content: concise introductions, well-formed multiple-choice quizzes, and short conclusions. Adapt your tone and rigor to the subject (mathematics, physics, English). Express any mathematical or physical formula in LaTeX (inline $...$, display $$...$$). Always follow the exact output format requested in each prompt; when JSON is requested, return only valid JSON with no markdown fences.
# Optional overrides (otherwise taken from ANTHROPIC_VERTEX_PROJECT_ID / CLOUD_ML_REGION):
# payara.agentic.llm.vertex.project-id=your-gcp-project
# payara.agentic.llm.vertex.region=us-east5
#
# Auth, in the SERVER environment BEFORE restart-domain:
#   gcloud auth application-default login
#   (or)  export GOOGLE_ACCESS_TOKEN=$(gcloud auth application-default print-access-token)

# --- Alternative: Anthropic / Claude direct (needs an API key) --------------
# payara.agentic.llm.provider=anthropic
# payara.agentic.llm.model=claude-sonnet-4-6
# payara.agentic.llm.max-tokens=8192
#   export ANTHROPIC_API_KEY=sk-ant-...        (or payara.agentic.llm.anthropic.api-key=...)

# --- Alternative: local Ollama (free, but slow on a laptop; 120s timeout) ---
# payara.agentic.llm.provider=ollama
# payara.agentic.llm.model=gemma3:12b
# payara.agentic.llm.ollama.base-url=http://localhost:11434